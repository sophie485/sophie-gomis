name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: html5up-site
  IMAGE_TAG: latest

jobs:
  ci:
    name: Build, Push & Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/html5up-site:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/html5up-site:latest

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/html5up-site:latest
          severity: HIGH,CRITICAL
          exit-code: 1

  deploy:
    name: Deploy on server
    runs-on: self-hosted
    needs: ci

    steps:
      - name: Deploy container
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/html5up-site:latest
          docker stop web || true
          docker rm web || true
          docker run -d --name web -p 80:80 \
          ${{ secrets.DOCKER_USERNAME }}/html5up-site:latest
